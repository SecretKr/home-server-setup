services:
  dashboard:
    image: b4bz/homer
    container_name: dashboard
    restart: unless-stopped
    volumes:
      - ./docker/homer/assets:/www/assets
    ports:
      - 80:8080
    user: "1000:1000"

  # 1. Portainer - Web UI for managing Docker
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/portainer:/data
    ports:
      - 9000:9000

  # 2. Samba - File Sharing (NAS)
  samba:
    image: ghcr.io/servercontainers/samba:latest
    container_name: samba
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    environment:
      - ACCOUNT_user=password
      - UID_user=1000
      - GROUPS_user=1000
      - MODEL=MacSamba
      - "SAMBA_GLOBAL_CONFIG_veto=veto files = /.DS_Store/.delete/._*/"
      - "SAMBA_GLOBAL_CONFIG_delete_veto=delete veto files = yes"
      - "SAMBA_VOLUME_CONFIG_HomeServer=[HomeServer];path=/shares/data;valid users=user;guest ok=no;read only=no;browseable=yes"
    volumes:
      - /data:/shares/data
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket

  # 3. Homebridge - Smart Home Bridge
  homebridge:
    image: homebridge/homebridge:latest
    container_name: homebridge
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./docker/homebridge:/homebridge
    logging:
      driver: json-file
      options:
        max-size: "10mb"
        max-file: "1"

  # 4. qBittorrent - Downloader
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Bangkok
      - WEBUI_PORT=8080
    volumes:
      - ./docker/qbittorrent/config:/config
      - /data/torrents:/downloads # Saves directly to your NAS folder
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp

  # 5. Tailscale - VPN / Remote Access
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: home-server
    restart: unless-stopped
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ./docker/tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW

  # 6. Scrutiny - HDD Health Monitoring
  scrutiny:
    image: ghcr.io/analogj/scrutiny:master-omnibus
    container_name: scrutiny
    restart: unless-stopped
    cap_add:
      - SYS_RAWIO
    ports:
      - 8081:8080 # Port 8080 is taken by qBittorrent, so we use 8081
    devices:
      - /dev/sda:/dev/sda # Pass your SSD through so it can be read
    volumes:
      - /run/udev:/run/udev:ro
      - ./docker/scrutiny/config:/opt/scrutiny/config
      - ./docker/scrutiny/influxdb:/opt/scrutiny/influxdb

  # 7. Jellyfin Media Server
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - 8096:8096
      - 8920:8920 # SSL Port (Optional)
      - 7359:7359/udp # Discovery (Optional)
      - 1900:1900/udp # DLNA (Optional)

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Bangkok
    volumes:
      - ./docker/jellyfin/config:/config
      # Map the torrents folder so Jellyfin can see downloads
      - /data/torrents:/data/torrents
      # Optional: Add storage if you have other media there
      - /data/storage:/data/storage
    devices:
      # Hardware Acceleration (Intel QuickSync)
      # Essential for smooth playback on older CPUs
      - /dev/dri:/dev/dri
