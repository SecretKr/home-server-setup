services:
  # 1. Portainer - Web UI for managing Docker
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/portainer:/data
    ports:
      - 9000:9000

  # 2. Samba - File Sharing (NAS)
  samba:
    image: dperson/samba
    container_name: samba
    restart: unless-stopped
    environment:
      - TZ=Asia/Bangkok
      - WORKGROUP=WORKGROUP
      - PERMISSIONS=true
    volumes:
      - /data/storage:/mount/storage
      - /data/torrents:/mount/torrents
    ports:
      - 139:139
      - 445:445
    command: '-u "user;password" -s "Storage;/mount/storage;yes;no;no;user" -s "Torrents;/mount/torrents;yes;no;no;user"'

  # 3. Homebridge - Smart Home Bridge
  homebridge:
    image: homebridge/homebridge:latest
    container_name: homebridge
    restart: unless-stopped
    network_mode: host # Required for device discovery
    volumes:
      - ./docker/homebridge:/homebridge
    logging:
      driver: json-file
      options:
        max-size: "10mb"
        max-file: "1"

  # 4. qBittorrent - Downloader
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      - PUID=1000 # Default user ID
      - PGID=1000 # Default group ID
      - TZ=Asia/Bangkok
      - WEBUI_PORT=8080
    volumes:
      - ./docker/qbittorrent/config:/config
      - /data/torrents:/downloads # Saves directly to your NAS folder
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp

  # 5. Tailscale - VPN / Remote Access
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: home-server
    restart: unless-stopped
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ./docker/tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW

  # 6. Scrutiny - HDD Health Monitoring
  scrutiny:
    image: ghcr.io/analogj/scrutiny:master-omnibus
    container_name: scrutiny
    restart: unless-stopped
    cap_add:
      - SYS_RAWIO
    ports:
      - 8081:8080 # Port 8080 is taken by qBittorrent, so we use 8081
    devices:
      - /dev/sda:/dev/sda # Pass your SSD through so it can be read
    volumes:
      - /run/udev:/run/udev:ro
      - ./docker/scrutiny/config:/opt/scrutiny/config
      - ./docker/scrutiny/influxdb:/opt/scrutiny/influxdb

  # 7. Plex Media Server
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    restart: unless-stopped
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - VERSION=docker
      - TZ=Asia/Bangkok
    volumes:
      - ./docker/plex/config:/config
      # This points Plex to the exact same folder as qBittorrent
      - /data/torrents:/data/torrents
      # Optional: Also add your storage folder just in case
      - /data/storage:/data/storage
    devices:
      # This enables hardware acceleration (if your CPU supports Intel QuickSync)
      # If this causes errors, add a # before the next line to disable it.
      - /dev/dri:/dev/dri
